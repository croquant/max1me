<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxime Desmet Vanden Stock</title>
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
      crossorigin="anonymous"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Mono", monospace;
        background-color: #cf8e72;
        color: #1a1008;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .card {
        background-color: #efe5d4;
        padding: 2.5rem;
      }

      main {
        max-width: 620px;
        width: 100%;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 1.25rem;
      }

      .photo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #1a1008;
        flex-shrink: 0;
      }

      h1 {
        font-family: "EB Garamond", serif;
        font-weight: 500;
        font-size: 2.6rem;
        line-height: 1.1;
        letter-spacing: -0.01em;
      }

      .details {
        font-size: 0.9rem;
        line-height: 1.9;
        color: #6b5845;
      }

      .details a {
        color: inherit;
        text-underline-offset: 3px;
        transition: color 0.2s;
      }

      .details a.link-breev {
        text-decoration-color: #9b8ec4;
      }
      .details a.link-breev:hover {
        color: #9b8ec4;
      }

      .details a.link-osu {
        text-decoration-color: #d73f09;
      }
      .details a.link-osu:hover {
        color: #d73f09;
      }

      .divider {
        border: none;
        border-top: 1px solid #b89a82;
        margin: 1.5rem 0;
      }

      .links {
        display: flex;
        gap: 1.1rem;
        align-items: center;
        flex-wrap: wrap;
        font-size: 0.9rem;
      }

      .links a {
        color: #1a1008;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: color 0.2s;
      }

      .links a:hover {
        color: #4a6fa5;
      }

      @media (max-width: 480px) {
        .header {
          gap: 1rem;
        }

        .photo {
          width: 72px;
          height: 72px;
        }

        h1 {
          font-size: 1.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="header">
          <img class="photo" src="face.jpg" alt="Maxime Desmet Vanden Stock" />
          <h1>Maxime Desmet<br />Vanden Stock</h1>
        </div>
        <div class="details">
          <p>
            Software Engineer at
            <a class="link-breev" href="https://breev.eu" target="_blank"
              >Breev</a
            >
          </p>
          <p>
            B.S. Computer Science,
            <a class="link-osu" href="https://oregonstate.edu" target="_blank"
              >Oregon State University</a
            >
          </p>
          <p>
            ML/AI Specialist &middot; AWS Certified &middot; Brussels, Belgium
          </p>
        </div>
        <hr class="divider" />
        <div class="links">
          <a href="https://github.com/croquant" target="_blank"
            ><i class="fab fa-github"></i> GitHub</a
          >
          <a href="https://www.linkedin.com/in/mdvds/" target="_blank"
            ><i class="fab fa-linkedin"></i> LinkedIn</a
          >
          <a href="mailto:desmet@max1.me"
            ><i class="fas fa-envelope"></i> Email</a
          >
          <a href="resume.pdf" download="maxime-dvds_resume.pdf"
            ><i class="fas fa-file-alt"></i> Resume</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
